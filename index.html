<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cardio</title>
  <style>
    @font-face {
      font-family: 'Destroy';
      font-style: normal;
      font-weight: 400;
      src: local('Destroy'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: 'Old Stamper';
      font-style: normal;
      font-weight: 400;
      src: local('Old Stamper'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: 'sportrop regular';
      font-style: normal;
      font-weight: 400;
      src: local('Sportrop Regular'), local('Sportrop-Regular'),
        url("./cardio/fonts/sportrop.regular.ttf") format("woff"),
        url("./cardio/fonts/sportrop.regular.ttf") format("opentype"),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: capture it;
      font-style: normal;
      font-weight: 400;
      src: local('Capture it'), local('Captureit-Regular'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: 'Armalite Rifle';
      font-style: normal;
      font-weight: 400;
      src: local('Armalite Rifle'), local('ArmaliteRifle-Regular'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script>
    window.startF = 0;
    /*----------------------------------------------------------------------
    Prevent Reload page when workout
    ----------------------------------------------------------------------*/
    window.onbeforeunload = function () {
      if (window.startF != 0) {
        return "Do you want to reload page?";
      };
    };

    /*----------------------------------------------------------------------
    Prevent Lock Screen on mobile
    - first event: click
    - second event: hide tab
    ----------------------------------------------------------------------*/
    var checkScreen = 0;
    document.addEventListener('click', async () => {
      if (('wakeLock' in navigator) && (checkScreen == 0)) {
        checkScreen = 1;
        let screenLock = await navigator.wakeLock.request('screen');
      };
    });

    document.addEventListener('visibilitychange', async () => {
      if ('wakeLock' in navigator) {
        let screenLock = await navigator.wakeLock.request('screen');
      };
    });
  </script>
  <script src="./cardio/build.js"></script>
  <iframe src="./background.html" style="display:none;"></iframe>
</body>

</html>
