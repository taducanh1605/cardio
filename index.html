<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cardio</title>
  <style>
    @font-face {
      font-family: 'Destroy';
      font-style: normal;
      font-weight: 400;
      src: local('Destroy'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: 'Old Stamper';
      font-style: normal;
      font-weight: 400;
      src: local('Old Stamper'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: 'sportrop regular';
      font-style: normal;
      font-weight: 400;
      src: local('Sportrop Regular'), local('Sportrop-Regular'),
        url("./cardio/fonts/sportrop.regular.ttf") format("woff"),
        url("./cardio/fonts/sportrop.regular.ttf") format("opentype"),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: capture it;
      font-style: normal;
      font-weight: 400;
      src: local('Capture it'), local('Captureit-Regular'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }

    @font-face {
      font-family: 'Armalite Rifle';
      font-style: normal;
      font-weight: 400;
      src: local('Armalite Rifle'), local('ArmaliteRifle-Regular'),
        url("./cardio/fonts/sportrop.regular.ttf") format("truetype");
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script>
    window.startF = 0;
    /*----------------------------------------------------------------------
    Prevent Reload page when workout
    ----------------------------------------------------------------------*/
    window.onbeforeunload = function () {
      if (window.startF != 0) {
        return "Do you want to reload page?";
      };
    };

    /*----------------------------------------------------------------------
    Keep screen awake + keep media unlocked on Android/iPhone
    - Re-request wake lock when tab becomes visible again
    - Only hold wake lock while workout is active
    - Prime audio from a real user gesture to avoid iOS audio blocking
    ----------------------------------------------------------------------*/
    (function () {
      var wakeLockSentinel = null;
      var wakeLockRetryTimer = null;
      var wakeLockRetryDelay = 800;
      var mediaPrimed = false;

      function isWorkoutActive() {
        return window.startF !== 0;
      }

      function shouldHoldWakeLock() {
        return isWorkoutActive() && document.visibilityState === 'visible';
      }

      function clearWakeLockRetry() {
        if (wakeLockRetryTimer) {
          clearTimeout(wakeLockRetryTimer);
          wakeLockRetryTimer = null;
        }
      }

      function scheduleWakeLockRetry() {
        if (wakeLockRetryTimer || !shouldHoldWakeLock()) {
          return;
        }
        wakeLockRetryTimer = setTimeout(function () {
          wakeLockRetryTimer = null;
          requestWakeLock();
        }, wakeLockRetryDelay);
      }

      function attachReleaseHandler(lock) {
        lock.addEventListener('release', function () {
          wakeLockSentinel = null;
          if (shouldHoldWakeLock()) {
            scheduleWakeLockRetry();
          }
        });
      }

      async function requestWakeLock() {
        if (!('wakeLock' in navigator) || wakeLockSentinel || !shouldHoldWakeLock()) {
          return;
        }

        try {
          wakeLockSentinel = await navigator.wakeLock.request('screen');
          attachReleaseHandler(wakeLockSentinel);
          wakeLockRetryDelay = 800;
        } catch (error) {
          wakeLockSentinel = null;
          wakeLockRetryDelay = Math.min(wakeLockRetryDelay * 2, 10000);
          scheduleWakeLockRetry();
        }
      }

      function releaseWakeLock() {
        clearWakeLockRetry();
        if (!wakeLockSentinel) {
          return;
        }
        var lockRef = wakeLockSentinel;
        wakeLockSentinel = null;
        lockRef.release().catch(function () {});
      }

      function syncWakeLock() {
        if (shouldHoldWakeLock()) {
          requestWakeLock();
        } else {
          releaseWakeLock();
        }
      }

      function primeMedia() {
        if (mediaPrimed) {
          return;
        }
        mediaPrimed = true;

        try {
          var unlockAudio = new Audio('./cardio/start.wav');
          unlockAudio.preload = 'auto';
          unlockAudio.volume = 0.001;
          var playPromise = unlockAudio.play();
          if (playPromise && typeof playPromise.then === 'function') {
            playPromise.then(function () {
              unlockAudio.pause();
              unlockAudio.currentTime = 0;
            }).catch(function () {});
          }
        } catch (error) {}
      }

      function handleFirstGesture() {
        primeMedia();
        syncWakeLock();
      }

      window.__cardioPrimeAudio = primeMedia;
      window.__cardioSyncWakeLock = syncWakeLock;

      document.addEventListener('click', handleFirstGesture, { passive: true });
      document.addEventListener('touchend', handleFirstGesture, { passive: true });
      document.addEventListener('visibilitychange', syncWakeLock);
      window.addEventListener('focus', syncWakeLock);
      window.addEventListener('pageshow', syncWakeLock);

      // Fallback periodic sync for browsers that silently release lock.
      setInterval(syncWakeLock, 15000);
    })();
  </script>
  <script src="./cardio/build.js"></script>
  <iframe src="./background.html" style="display:none;"></iframe>
</body>

</html>
